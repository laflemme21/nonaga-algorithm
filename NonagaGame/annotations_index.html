<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cython Annotation Reports</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --text: #1f2933;
            --muted: #52606d;
            --accent: #0b6e99;
            --accent-hover: #084c6b;
            --border: #d9e2ec;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #eef3f7 0%, #f8fafc 100%);
            color: var(--text);
        }

        .wrap {
            max-width: 760px;
            margin: 48px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.6rem;
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 10px;
        }

        a {
            display: block;
            text-decoration: none;
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            background: #fbfdff;
            font-weight: 600;
            transition: border-color 120ms ease, color 120ms ease, background-color 120ms ease;
        }

        a:hover {
            color: var(--accent-hover);
            border-color: #bcccdc;
            background: #f0f7fb;
        }

        code {
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.95em;
            color: #334e68;
        }
    </style>
</head>

<body>
    <main class="wrap">
        <section class="card">
            <h1>Cython Annotation Reports</h1>
            <p>Open a report to inspect Python interaction hotspots in each compiled module.</p>
            <ul>
                <li><a href="AI.html">AI (<code>AI.pyx</code>)</a></li>
                <li><a href="nonaga_logic.html">Nonaga Logic (<code>nonaga_logic.pyx</code>)</a></li>
                <li><a href="nonaga_constants.html">Nonaga Constants (<code>nonaga_constants.pyx</code>)</a></li>
                <li><a href="nonaga_bitboard.html">Nonaga Bitboard (<code>nonaga_bitboard.pyx</code>)</a></li>
            </ul>
        </section>
    </main>
</body>

</html>
